:root{--bg:#0a0e17;--surface:#111827;--surface-2:#1a2235;--border:#1e2d45;--text:#e2e8f0;--muted:#7b8ba5;--accent:#ffe234;--green:#34d399;--blue:#60a5fa;--purple:#a78bfa;--red:#f87171;--orange:#fb923c;--cyan:#22d3ee}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
.header{padding:22px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.header-left h1 span{color:var(--accent)}
.header-left p{color:var(--muted);font-size:11px;margin-top:3px;font-family:'Space Mono',monospace}
.controls{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.seller-tabs{display:flex;gap:4px;flex-wrap:wrap}
.stab{padding:6px 13px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif}
.stab:hover{border-color:var(--accent);color:var(--text)}
.stab.on{background:var(--accent);border-color:var(--accent);color:#0a0e17}
.date-filter{display:flex;gap:6px;align-items:center}
.date-filter label{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.date-filter select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer}
.date-filter select:focus{outline:none;border-color:var(--accent)}
.main{padding:18px 28px 40px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:20px}
.kc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px}
.kc.c1::before{background:var(--accent)}.kc.c2::before{background:var(--green)}.kc.c3::before{background:var(--blue)}.kc.c4::before{background:var(--purple)}.kc.c5::before{background:var(--orange)}.kc.c6::before{background:var(--red)}.kc.c7::before{background:var(--cyan)}
.yoy{font-size:11px;font-weight:600;font-family:'Space Mono',monospace;margin-left:6px;vertical-align:middle}
.yoy.up{color:var(--green)}.yoy.dn{color:var(--red)}
.kl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-family:'Space Mono',monospace}
.kv{font-size:24px;font-weight:700;margin-top:3px;letter-spacing:-1px}
.ks{font-size:10px;color:var(--muted);margin-top:2px}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;font-family:'Space Mono',monospace}
.bu{background:rgba(52,211,153,.15);color:var(--green)}.bd{background:rgba(248,113,113,.15);color:var(--red)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.cc.full{grid-column:1/-1}
.ct{font-size:12px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ct .d{width:6px;height:6px;border-radius:50%;display:inline-block}
.cw{position:relative;height:230px}
.cw.tall{height:280px}
.sec{font-size:15px;font-weight:700;margin:24px 0 12px;padding-left:10px;border-left:3px solid var(--accent)}
table.snap{width:100%;border-collapse:collapse;font-size:11px}
table.snap th{text-align:left;padding:8px 10px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-family:'Space Mono',monospace;border-bottom:1px solid var(--border)}
table.snap td{padding:9px 10px;border-bottom:1px solid var(--border)}
table.snap tr:last-child td{border-bottom:none}
table.snap tr:hover td{background:var(--surface-2)}
.bf{height:5px;border-radius:3px;display:inline-block}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.header{padding:14px}.main{padding:12px}}
</style>
</head>

function inRange(m){return m>=mFrom&&m<=mTo}
function filteredMonths(){return ALL_MONTHS.filter(inRange)}

function destroyAll(){chartInstances.forEach(c=>{try{c.destroy()}catch(e){}});chartInstances=[]}

function initDateFilter(){
  const sf=document.getElementById('dateFrom'),st=document.getElementById('dateTo');
  sf.innerHTML='';st.innerHTML='';
  ALL_MONTHS.forEach(m=>{
    sf.innerHTML+=`<option value="${m}"${m===mFrom?' selected':''}>${mLbl(m)}</option>`;
    st.innerHTML+=`<option value="${m}"${m===mTo?' selected':''}>${mLbl(m)}</option>`;
  });
  sf.onchange=()=>{mFrom=sf.value;if(mFrom>mTo){mTo=mFrom;st.value=mTo}render()};
  st.onchange=()=>{mTo=st.value;if(mTo<mFrom){mFrom=mTo;sf.value=mFrom}render()};
}

function buildTabs(){
  const t=document.getElementById('tabs');t.innerHTML='';
  const mk=(label,val)=>{const b=document.createElement('button');b.className='stab'+(act===val?' on':'');b.textContent=label;
    if(act===val&&val!=='all'){b.style.background=CL[val];b.style.borderColor=CL[val];b.style.color='#0a0e17'}
    b.onclick=()=>{act=val;render()};t.appendChild(b)};
  mk('Todos','all');
  S_IDS.forEach(id=>mk(NM[id],id));
}

function yoyMonth(m){const[y,mo]=m.split('-');return (parseInt(y)-1)+'-'+mo}

function calcYoY(data,sKey,mKey,vKey,sid){
  // sid is null for all, or a single seller ID
  const sids=sid?[sid]:null;
  const currentData=(sids?data.filter(r=>sids.includes(r[sKey])):data).filter(r=>inRange(r[mKey]));
  const curTotal=currentData.reduce((a,r)=>a+(r[vKey]||0),0);
  const yoyMonths=filteredMonths().map(yoyMonth);
  const prevData=(sids?data.filter(r=>sids.includes(r[sKey])):data).filter(r=>yoyMonths.includes(r[mKey]));
  const prevTotal=prevData.reduce((a,r)=>a+(r[vKey]||0),0);
  if(prevTotal===0)return null;
  return ((curTotal-prevTotal)/prevTotal*100);
}

function yoyBadge(val){
  if(val===null)return'<span class="yoy" style="color:var(--muted)">—</span>';
  const cls=val>=0?'up':'dn';
  const sign=val>=0?'+':'';
  return`<span class="yoy ${cls}">${sign}${val.toFixed(1)}%</span>`;
}

function buildKPIs(){
  const sids=act==='all'?null:[act];
  const sl=(act==='all'?SALES:SALES.filter(r=>r.S==act)).filter(r=>inRange(r.m));
  const vl=(act==='all'?VIS:VIS.filter(r=>r.s==act)).filter(r=>inRange(r.m));
  const il=act==='all'?SNAP:SNAP.filter(r=>r.s==act);
  const tG=sl.reduce((a,r)=>a+r.g,0),tSI=sl.reduce((a,r)=>a+r.si,0),tO=sl.reduce((a,r)=>a+r.o,0);
  const tV=vl.reduce((a,r)=>a+r.v,0),tOC=vl.reduce((a,r)=>a+r.oc,0);
  const cvr=tV>0?(tOC/tV*100):0;
  const lL=il.reduce((a,r)=>a+r.ll,0),fL=il.reduce((a,r)=>a+r.fl,0),cL=il.reduce((a,r)=>a+r.cl,0);

  // YoY calculations
  const yG=calcYoY(SALES,'S','m','g',act==='all'?null:act);
  const ySI=calcYoY(SALES,'S','m','si',act==='all'?null:act);
  const yV=calcYoY(VIS,'s','m','v',act==='all'?null:act);
  const yO=calcYoY(SALES,'S','m','o',act==='all'?null:act);

  // CVR YoY: need to compute CVR for prev year period
  let yCVR=null;
  const yoyMs=filteredMonths().map(yoyMonth);
  const prevVis=(act==='all'?VIS:VIS.filter(r=>r.s==act)).filter(r=>yoyMs.includes(r.m));
  const prevV=prevVis.reduce((a,r)=>a+r.v,0),prevOC=prevVis.reduce((a,r)=>a+r.oc,0);
  if(prevV>0){const prevCvr=prevOC/prevV*100;if(prevCvr>0)yCVR=((cvr-prevCvr)/prevCvr*100)}

  document.getElementById('kpis').innerHTML=`
  <div class="kc c1"><div class="kl">Facturación (UYU)</div><div class="kv">${fmt(tG)}${yoyBadge(yG)}</div><div class="ks">Período seleccionado</div></div>
  <div class="kc c2"><div class="kl">Unidades</div><div class="kv">${fmt(tSI)}${yoyBadge(ySI)}</div><div class="ks">Período seleccionado</div></div>
  <div class="kc c3"><div class="kl">Visitas</div><div class="kv">${fmt(tV)}${yoyBadge(yV)}</div><div class="ks">Período seleccionado</div></div>
  <div class="kc c7"><div class="kl">CVR</div><div class="kv">${cvr.toFixed(2)}%${yoyBadge(yCVR)}</div><div class="ks">Conversión visita→orden</div></div>
  <div class="kc c4"><div class="kl">Live Listings</div><div class="kv">${fmtF(lL)}</div><div class="ks">Catálogo: ${fmtF(cL)}</div></div>
  <div class="kc c5"><div class="kl">Flex Listings</div><div class="kv">${fmtF(fL)}</div><div class="ks">${pct(fL,lL)}% del live</div></div>
  <div class="kc c6"><div class="kl">Orders</div><div class="kv">${fmt(tO)}${yoyBadge(yO)}</div><div class="ks">Período seleccionado</div></div>`;
}

function mkChart(canvasId,type,labels,datasets,opts={}){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const cfg={type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:opts.legend||false,labels:{color:'#7b8ba5',font:{family:'Space Mono',size:9},boxWidth:10,padding:8}},
    tooltip:{backgroundColor:'#1a2235',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#1e2d45',borderWidth:1,padding:8,cornerRadius:6,
    callbacks:opts.tooltipCb||{}}},
    interaction:opts.interaction||{},
    scales:{x:{grid:{color:'rgba(30,45,69,.4)',drawBorder:false},ticks:{color:'#7b8ba5',font:{family:'Space Mono',size:9},maxRotation:45},stacked:!!opts.stacked},
    y:{grid:{color:'rgba(30,45,69,.4)',drawBorder:false},ticks:{color:'#7b8ba5',font:{family:'Space Mono',size:9},callback:opts.yFmt||(v=>v)},stacked:!!opts.stacked},
    ...(opts.y1?{y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#f87171',font:{family:'Space Mono',size:9},callback:v=>v.toFixed(1)+'%'},min:0}}:{})
    }}};
  const ch=new Chart(canvas,cfg);
  chartInstances.push(ch);
  return ch;
}

function aggByMonth(data,sKey,mKey,vKeys,sids){
  const months=filteredMonths();
  const map={};
  months.forEach(m=>{map[m]={};vKeys.forEach(k=>{map[m][k]=0})});
  const filtered=sids?data.filter(r=>sids.includes(r[sKey])):data;
  filtered.filter(r=>inRange(r[mKey])).forEach(r=>{
    if(!map[r[mKey]])return;
    vKeys.forEach(k=>{map[r[mKey]][k]+=(r[k]||0)});
  });
  return months.map(m=>({m,...map[m]}));
}

function buildMainCharts(){
  const months=filteredMonths();
  const labels=months.map(mLbl);
  const isAll=act==='all';
  const sids=isAll?S_IDS:[act];

  // GMV
  if(isAll){
    const ds=S_IDS.map(id=>{const agg=aggByMonth(SALES,'S','m',['g'],[id]);return{label:NM[id],data:agg.map(r=>r.g||null),borderColor:CL[id],backgroundColor:CL[id]+'33',borderWidth:2,tension:.3,pointRadius:2,fill:false,spanGaps:true}});
    mkChart('cGMV','line',labels,ds,{legend:true});
  }else{
    const agg=aggByMonth(SALES,'S','m',['g'],[act]);
    mkChart('cGMV','line',labels,[{label:NM[act],data:agg.map(r=>r.g||null),borderColor:CL[act],backgroundColor:CL[act]+'33',borderWidth:2.5,tension:.3,pointRadius:3,fill:true,spanGaps:true}]);
  }

  // Visits
  if(isAll){
    const ds=S_IDS.map(id=>{const agg=aggByMonth(VIS,'s','m',['v'],[id]);return{label:NM[id],data:agg.map(r=>r.v||null),borderColor:CL[id],borderWidth:2,tension:.3,pointRadius:2,fill:false,spanGaps:true}});
    mkChart('cVis','line',labels,ds);
  }else{
    const agg=aggByMonth(VIS,'s','m',['v'],[act]);
    mkChart('cVis','line',labels,[{label:NM[act],data:agg.map(r=>r.v||null),borderColor:CL[act],backgroundColor:CL[act]+'33',borderWidth:2.5,tension:.3,pointRadius:3,fill:true,spanGaps:true}]);
  }

  // CVR
  if(isAll){
    const ds=S_IDS.map(id=>{
      const vd=VIS.filter(r=>r.s==id&&inRange(r.m));
      const dm={};vd.forEach(r=>{dm[r.m]=r.v>0?r.oc/r.v*100:null});
      return{label:NM[id],data:months.map(m=>dm[m]!==undefined?dm[m]:null),borderColor:CL[id],borderWidth:2,tension:.3,pointRadius:2,fill:false,spanGaps:true};
    });
    mkChart('cCVR','line',labels,ds,{yFmt:v=>v.toFixed(1)+'%'});
  }else{
    const vd=VIS.filter(r=>r.s==act&&inRange(r.m));
    const dm={};vd.forEach(r=>{dm[r.m]=r.v>0?r.oc/r.v*100:null});
    mkChart('cCVR','line',labels,[{label:NM[act],data:months.map(m=>dm[m]!==undefined?dm[m]:null),borderColor:CL[act],backgroundColor:CL[act]+'33',borderWidth:2.5,tension:.3,pointRadius:3,fill:true,spanGaps:true}],{yFmt:v=>v.toFixed(1)+'%'});
  }

  // SI & Orders (stacked bar when all)
  const mkBar=(canvasId,vKey)=>{
    if(isAll){
      const ds=S_IDS.map(id=>{const agg=aggByMonth(SALES,'S','m',[vKey],[id]);return{label:NM[id],data:agg.map(r=>r[vKey]),backgroundColor:CL[id]+'99',borderColor:CL[id],borderWidth:1,borderRadius:3}});
      mkChart(canvasId,'bar',labels,ds,{stacked:true});
    }else{
      const agg=aggByMonth(SALES,'S','m',[vKey],[act]);
      mkChart(canvasId,'bar',labels,[{label:NM[act],data:agg.map(r=>r[vKey]),backgroundColor:CL[act]+'99',borderColor:CL[act],borderWidth:1,borderRadius:3}]);
    }
  };
  mkBar('cSI','si');
  mkBar('cOrd','o');
}

function buildLLCharts(){
  const area=document.getElementById('llArea');area.innerHTML='';
  const targets=act==='all'?S_IDS:[act];

  targets.forEach(id=>{
    const data=LL.filter(r=>r.s==id&&inRange(r.m));
    if(!data.length)return;
    const ms=data.map(r=>r.m);
    const labels=ms.map(mLbl);
    const slPct=data.map(r=>r.ll>0?(r.sl/r.ll*100):0);

    const span=act==='all'?'':'full';
    const card=document.createElement('div');card.className='cc '+span;
    const cid='ll_'+id;
    card.innerHTML=`<div class="ct"><span class="d" style="background:${CL[id]}"></span>${NM[id]} — Live Listings & % Successful</div><div class="cw"><canvas id="${cid}"></canvas></div>`;
    area.appendChild(card);

    const canvas=document.getElementById(cid);
    const ch=new Chart(canvas,{type:'bar',data:{labels,datasets:[
      {label:'Live Listings',data:data.map(r=>r.ll),backgroundColor:CL[id]+'66',borderColor:CL[id],borderWidth:1,borderRadius:3,yAxisID:'y',order:2},
      {label:'% Successful',data:slPct,type:'line',borderColor:'#f87171',backgroundColor:'#f8717133',borderWidth:2,tension:.3,pointRadius:3,pointBackgroundColor:'#f87171',yAxisID:'y1',order:1}
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true,labels:{color:'#7b8ba5',font:{family:'Space Mono',size:9},boxWidth:10,padding:8}},
      tooltip:{backgroundColor:'#1a2235',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#1e2d45',borderWidth:1,padding:8,cornerRadius:6,
      callbacks:{label:function(ctx){return ctx.dataset.yAxisID==='y1'?'% Successful: '+ctx.parsed.y.toFixed(2)+'%':'Live Listings: '+ctx.parsed.y.toLocaleString('es-UY')}}}},
      scales:{x:{grid:{color:'rgba(30,45,69,.4)',drawBorder:false},ticks:{color:'#7b8ba5',font:{family:'Space Mono',size:9},maxRotation:45}},
      y:{position:'left',grid:{color:'rgba(30,45,69,.4)',drawBorder:false},ticks:{color:CL[id],font:{family:'Space Mono',size:9}}},
      y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#f87171',font:{family:'Space Mono',size:9},callback:v=>v.toFixed(1)+'%'},min:0}}}});
    chartInstances.push(ch);
  });
}

function buildSnap(){
  const items=act==='all'?SNAP:SNAP.filter(r=>r.s==act);
  const mx=Math.max(...SNAP.map(r=>r.ll));
  document.getElementById('snapT').innerHTML=`
  <thead><tr><th>Seller</th><th>Live</th><th style="width:110px"></th><th>Catálogo</th><th>Flex</th><th>% Flex</th><th>Pausadas</th><th>Revisión</th></tr></thead>
  <tbody>${items.map(r=>{const fp=r.ll>0?(r.fl/r.ll*100).toFixed(1):'0.0';const bw=(r.ll/mx*100).toFixed(0);const c=CL[r.s];
  return`<tr><td style="font-weight:700;color:${c}">${NM[r.s]}</td><td style="font-weight:700">${fmtF(r.ll)}</td><td><span class="bf" style="width:${bw}%;background:${c};min-width:3px"></span></td><td>${fmtF(r.cl)}</td><td>${fmtF(r.fl)}</td><td><span class="badge ${parseFloat(fp)>80?'bu':'bd'}">${fp}%</span></td><td>${fmtF(r.pl)}</td><td>${r.ur}</td></tr>`}).join('')}</tbody>`;
}

function render(){
  destroyAll();
  buildTabs();
  buildKPIs();
  buildMainCharts();
  buildLLCharts();
  buildSnap();
}

initDateFilter();
render();
</script>
</body>
</html>
